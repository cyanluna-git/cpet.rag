# 로컬 개발용 — 서빙 API (인입은 Colab/AWS Batch에서 GPU로)
services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8110:8110"          # cpet.rag backend
    env_file: .env
    volumes:
      - ./:/app
    command: uvicorn serving.app.main:app --host 0.0.0.0 --port 8110 --reload

  # (선택) 챗봇 웹 UI
